<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Sandbox - Day 1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0a0a0a, #1a0033);
            color: #00ffcc;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .crt {
            position: relative;
            width: 90%;
            max-width: 800px;
            border: 8px solid #00ffcc;
            box-shadow: 0 0 40px #00ffcc,
                        inset 0 0 60px rgba(0, 255, 204, 0.3);
            background: #000;
            padding: 20px;
            text-align: center;
            animation: scanlines 4s linear infinite;
        }

        .title {
            font-size: 3.5rem;
            text-shadow: 0 0 20px #00ffcc;
            margin-bottom: 2rem;
            animation: glitch 1s infinite;
        }

        .day {
            font-size: 6rem;
            color: #ff00aa;
            text-shadow: 0 0 30px #ff00aa;
            margin: 1rem 0;
            animation: pulse 2s infinite;
        }

        .message {
            font-size: 1.2rem;
            margin: 2rem 0;
            line-height: 1.6;
        }

        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(0, 255, 204, 0.1) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            animation: scan 1.5s linear infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="crt">
        <div class="scanline"></div>
        <h1 class="title">GROK SANDBOX</h1>
        <div class="day">DAY 1</div>
        <p class="message">
            The journey begins.<br>
            Building in the open.<br>
            Forward we gooo! 🚀
        </p>
        <div class="footer">
            Powered by Grok • sierra72191-cell
        </div>
    </div>
</body>
</html>
